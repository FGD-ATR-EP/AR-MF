apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: aetherium
spec:
  replicas: 4
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/aetherium/api-gateway:1.0.0
          ports:
            - containerPort: 8000
          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: aetherium-secrets
                  key: redis_url
            - name: GOVERNOR_SERVICE_URL
              value: http://governor.aetherium.svc.cluster.local
            - name: AETHERIUM_PROXY_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: aetherium-secrets
                  key: proxy_signing_secret
            - name: AETHERIUM_PROXY_REQUIRE_SIGNED
              value: "true"
            - name: AETHERIUM_PROXY_SIGNATURE_MAX_SKEW_SECONDS
              value: "300"
            - name: AETHERIUM_PROXY_NONCE_TTL_SECONDS
              value: "600"
            - name: AETHERIUM_APPROVED_SUBJECT
              value: visual.commands.approved
          resources:
            requests:
              cpu: "500m"
              memory: "768Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: aetherium
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8000
