apiVersion: v2
name: aetherium-manifest
description: Umbrella Helm chart for Aetherium Manifest core services and optional infra dependencies.
type: application
version: 0.1.0
appVersion: "0.1.0"

dependencies:
  - name: redis
    version: 20.6.3
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
    tags:
      - infra
      - state-plane
  - name: nats
    version: 1.3.8
    repository: https://nats-io.github.io/k8s/helm/charts/
    condition: nats.enabled
    tags:
      - infra
      - messaging
  - name: kafka
    version: 31.2.10
    repository: https://charts.bitnami.com/bitnami
    condition: kafka.enabled
    tags:
      - infra
      - messaging
  - name: clickhouse
    version: 9.3.6
    repository: https://charts.bitnami.com/bitnami
    condition: clickhouse.enabled
    tags:
      - infra
      - telemetry
      - datastore
