{{- if .Values.wsGateway.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ws-gateway-hpa
  labels:
    {{- include "aetherium-manifest.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ws-gateway
  minReplicas: {{ .Values.wsGateway.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.wsGateway.autoscaling.maxReplicas }}
  behavior:
    {{- toYaml .Values.wsGateway.autoscaling.behavior | nindent 4 }}
  metrics:
    {{- toYaml .Values.wsGateway.autoscaling.metrics | nindent 4 }}
{{- end }}
