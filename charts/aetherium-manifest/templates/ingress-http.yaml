{{- if .Values.ingress.http.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "aetherium-manifest.fullname" . }}-http
  labels:
    {{- include "aetherium-manifest.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.ingress.http.annotations | nindent 4 }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.http.host | quote }}
      http:
        paths:
          - path: {{ .Values.ingress.http.path | quote }}
            pathType: {{ .Values.ingress.http.pathType }}
            backend:
              service:
                name: api-gateway
                port:
                  number: {{ .Values.ingress.http.servicePort }}
  {{- if .Values.ingress.http.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.http.host | quote }}
      secretName: {{ .Values.ingress.http.tls.secretName | quote }}
  {{- end }}
{{- end }}
