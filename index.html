<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AETHERIUM Light Control Kernel v3</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');

    :root {
      --void-bg: #010102;
      --glass-bg: rgba(10, 10, 12, 0.88);
      --text: #e5e7eb;
      --muted: #6b7280;
      --blue: #00e5ff;
      --pink: #ff0055;
      --gold: #ffd166;
      --green: #4ade80;
      --crimson: #dc2626;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--void-bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      user-select: none;
    }

    canvas#display-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    canvas#memory-layer { display: none; }

    #hud {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 10;
      width: 390px;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.45);
    }

    .section-title {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 2px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding-bottom: 6px;
      margin-bottom: 12px;
    }

    .fsm-track {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
      padding-bottom: 16px;
    }

    .fsm-node {
      position: relative;
      flex: 1;
      height: 4px;
      background: #1f2937;
      border-radius: 999px;
      transition: 0.2s ease;
    }

    .fsm-node.active {
      background: var(--blue);
      box-shadow: 0 0 10px rgba(0,229,255,0.85);
    }

    .fsm-label {
      position: absolute;
      top: 9px;
      left: 0;
      font-size: 9px;
      color: var(--muted);
      white-space: nowrap;
    }

    .fsm-node.active .fsm-label { color: #fff; }

    .metric {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 11px;
      margin-bottom: 6px;
    }

    .metric .val {
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    textarea {
      width: 100%;
      min-height: 90px;
      resize: vertical;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      border-radius: 8px;
      padding: 10px;
      font: inherit;
      font-size: 12px;
      line-height: 1.5;
      outline: none;
    }

    .btn-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    button {
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
      color: #fff;
      border-radius: 8px;
      padding: 10px;
      cursor: pointer;
      font: inherit;
      font-size: 11px;
      transition: 0.2s ease;
    }

    button:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.25);
    }

    .full { grid-column: 1 / -1; }

    .schema-box {
      max-height: 180px;
      overflow: auto;
      font-size: 10px;
      line-height: 1.45;
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 10px;
      white-space: pre-wrap;
      user-select: text;
    }

    .pill {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      font-size: 10px;
      color: var(--muted);
      margin-right: 6px;
    }
  </style>
</head>
<body>
  <canvas id="display-layer"></canvas>
  <canvas id="memory-layer"></canvas>

  <div id="hud">
    <div class="section-title">AETHERIUM LIGHT CONTROL KERNEL v3</div>

    <div class="fsm-track">
      <div class="fsm-node active" id="fsm-IDLE"><div class="fsm-label">IDLE</div></div>
      <div class="fsm-node" id="fsm-PARSE"><div class="fsm-label">PARSE</div></div>
      <div class="fsm-node" id="fsm-RETRIEVE"><div class="fsm-label">RETRIEVE</div></div>
      <div class="fsm-node" id="fsm-COMPILE"><div class="fsm-label">COMPILE</div></div>
      <div class="fsm-node" id="fsm-FORMING"><div class="fsm-label">FORMING</div></div>
      <div class="fsm-node" id="fsm-RESONATE"><div class="fsm-label">RESONATE</div></div>
      <div class="fsm-node" id="fsm-FEEDBACK"><div class="fsm-label">FEEDBACK</div></div>
    </div>

    <div class="section-title">USER REQUEST</div>
    <textarea id="txt-request">สร้างรูปทรงเกลียวสีทองอมม่วง ค่อยๆ ลอยขึ้นอย่างสงบ เหมือน AI กำลังคิดอย่างลึกซึ้ง</textarea>

    <div class="btn-grid">
      <button onclick="runUserRequest()">RUN REQUEST</button>
      <button onclick="resetToVoid()">RESET VOID</button>
      <button onclick="quickPreset('sphere')">PRESET SPHERE</button>
      <button onclick="quickPreset('flower')">PRESET FLOWER</button>
      <button onclick="quickPreset('vortex')">PRESET VORTEX</button>
      <button onclick="quickPreset('fracture')">PRESET FRACTURE</button>
      <button class="full" onclick="showSchema()">SHOW LCL SCHEMA</button>
    </div>

    <div style="margin-top: 16px" class="section-title">RUNTIME</div>
    <div class="metric"><span>Kernel State</span><span class="val" id="val-state">IDLE</span></div>
    <div class="metric"><span>Render Mode</span><span class="val" id="val-render">void</span></div>
    <div class="metric"><span>Archetype</span><span class="val" id="val-arch">none</span></div>
    <div class="metric"><span>Targets</span><span class="val" id="val-targets">0</span></div>
    <div class="metric"><span>Coherence</span><span class="val" id="val-coh">0.10</span></div>
    <div class="metric"><span>FlowMag</span><span class="val" id="val-flow">1.00</span></div>
    <div class="metric"><span>Readability</span><span class="val" id="val-read">0.00</span></div>
    <div class="metric"><span>Coverage</span><span class="val" id="val-cover">0.00</span></div>
    <div class="metric"><span>Stability</span><span class="val" id="val-stab">0.00</span></div>

    <div style="margin-top: 16px" class="section-title">LCL</div>
    <div class="schema-box" id="schema-view">กด RUN REQUEST หรือ SHOW LCL SCHEMA</div>
  </div>

  <script type="module" src="kernel.js"></script>
</body>
</html>
