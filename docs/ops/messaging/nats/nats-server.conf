server_name: nats-aetherium
port: 4222
http: 8222

jetstream {
  store_dir: /data/jetstream
  max_mem_store: 8Gb
  max_file_store: 500Gb
}

accounts {
  AETHERIUM: {
    users: [
      {user: api_gateway, password: ${API_GATEWAY_PASSWORD}}
      {user: governor, password: ${GOVERNOR_PASSWORD}}
      {user: ws_gateway, password: ${WS_GATEWAY_PASSWORD}}
      {user: telemetry, password: ${TELEMETRY_PASSWORD}}
    ]
  }
}

authorization {
  default_account: AETHERIUM
}

write_deadline: "5s"
max_pending: 128MB
max_payload: 1MB
max_control_line: 4KB
ping_interval: "20s"
ping_max: 3
