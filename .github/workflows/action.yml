name: Workflow Hygiene

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/codex/**"
      - "scripts/**"
  push:
    branches: ["main", "master", "develop"]
    paths:
      - ".github/workflows/**"
      - ".github/codex/**"
  workflow_dispatch:

concurrency:
  group: workflow-hygiene-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-workflows:
    name: Lint GitHub workflow and action files
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Run actionlint
        uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca # v1 (resolved to v1.7.12)
