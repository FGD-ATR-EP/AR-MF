name: Deploy app to AKS with Helm

on:
  workflow_call:
    inputs:
      deployment_environment:
        description: Target environment (dev, staging, prod)
        required: true
        type: string
      image_digest:
        description: OCI image digest that has already passed promotion gates (sha256:...)
        required: true
        type: string
      gate_passed:
        description: Gate assertion from upstream workflow
        required: true
        type: boolean
  workflow_dispatch:
    inputs:
      deployment_environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      image_digest:
        description: OCI image digest that has already passed promotion gates (sha256:...)
        required: true
        type: string
      gate_passed:
        description: Confirm that this digest passed required gates
        required: true
        type: boolean

permissions:
  contents: read
  id-token: write

env:
  AZURE_CONTAINER_REGISTRY: "your-azure-container-registry"
  CONTAINER_NAME: "your-container-name"
  RESOURCE_GROUP: "your-resource-group"
  CLUSTER_NAME: "your-cluster-name"
  CHART_PATH: "your-chart-path"
  CHART_OVERRIDE_PATH: "your-chart-override-path"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: ${{ (inputs.gate_passed || github.event.inputs.gate_passed == 'true') && (inputs.image_digest || github.event.inputs.image_digest) != '' && secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_TENANT_ID != '' && secrets.AZURE_SUBSCRIPTION_ID != '' }}
    environment:
      name: ${{ inputs.deployment_environment || github.event.inputs.deployment_environment }}
    concurrency:
      group: deploy-${{ inputs.deployment_environment || github.event.inputs.deployment_environment }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Azure login
        uses: azure/login@2dd0bbf4064d5a1812889dc200bb8eed2597f82a # v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up kubelogin for non-interactive login
        uses: azure/use-kubelogin@76597ae0fcbaace21b05e13a2cbf8daee2c6e820 # v1
        with:
          kubelogin-version: 'v0.0.25'

      - name: Get K8s context
        uses: azure/aks-set-context@5bdb70522845f81ca7d7bb7379668c992e4d3593 # v5
        with:
          resource-group: ${{ env.RESOURCE_GROUP }}
          cluster-name: ${{ env.CLUSTER_NAME }}
          admin: 'false'
          use-kubelogin: 'true'

      - name: Bake deployment
        id: bake
        uses: azure/k8s-bake@0909527dc3b0b8d0e4c0e73ca49389ba475c8902 # v3
        with:
          renderEngine: "helm"
          helmChart: ${{ env.CHART_PATH }}
          overrideFiles: ${{ env.CHART_OVERRIDE_PATH }}
          overrides: |
            replicas:2
          helm-version: "latest"

      - name: Deploy application
        uses: Azure/k8s-deploy@e84e0e29ee2acf291bb57dd0e8870dc0432e1627 # v5
        with:
          action: deploy
          manifests: ${{ steps.bake.outputs.manifestsBundle }}
          images: |
            ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.CONTAINER_NAME }}@${{ inputs.image_digest || github.event.inputs.image_digest }}
